<!doctype html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>記帳</title>
<meta name="theme-color" content="#F2EBD8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Huninn&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0&display=block" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css" rel="stylesheet">
<link rel="stylesheet" href="app.css?v=9">
</head>
<body>
<main id="app"></main>
<div id="voice" class="voice-wrap hidden"></div>
<div id="overlay" class="hidden">
  <div class="scrim" data-act="close-sheet"></div>
  <div class="sheet">
    <div class="s-tabs" id="s-tabs"></div>
    <div class="s-body" id="s-body"></div>
  </div>
</div>
<div id="modal" class="modal-wrap hidden">
  <div class="scrim" style="opacity:1" data-act="close-modal"></div>
  <div class="modal" id="modal-box" style="position:relative"></div>
</div>
<div id="toast"></div>
<input type="date" id="datepick" style="position:fixed; opacity:0; pointer-events:none; bottom:0">
<script src="app.js?v=9"></script>
</body>
</html>
